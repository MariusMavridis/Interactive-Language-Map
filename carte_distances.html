<div id="slider-container" style="position: fixed; top: 10px; left: 50px; z-index: 9999; background: white; padding: 10px; border: 1px solid black;">
    <label for="distance-slider">Distance max : <span id="slider-value">1500</span></label><br>
    <input type="range" min="0" max="2000" value="1500" id="distance-slider" step="100">
</div>

<script>
document.getElementById('distance-slider').addEventListener('input', function () {
    var maxDist = parseInt(this.value);
    document.getElementById('slider-value').innerText = maxDist;

    window.lines.forEach(function (line) {
        if (line.options.distance <= maxDist) {
            if (!map.hasLayer(line)) {
                map.addLayer(line);
            }
        } else {
            if (map.hasLayer(line)) {
                map.removeLayer(line);
            }
        }
    });
});
</script>
